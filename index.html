<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Japan 2026 · 16 Days</title>
<meta name="theme-color" content="#dc2626">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Japan Trip">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="dayStripe"></div>

<button id="menuBtn" aria-label="Show sidebar" title="Show sidebar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg>
</button>

<aside id="sidebar">
  <div class="sb-header">
    <div>
      <div class="sb-title">Japan 2026</div>
      <div class="sb-sub">16 days · Tokyo → Kansai</div>
    </div>
    <div style="display:flex; gap:6px; align-items:center;">
      <div class="sb-count" id="pinCount">0 pins</div>
      <button class="sb-collapse" id="collapseBtn" aria-label="Hide sidebar" title="Hide sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </div>
  </div>

  <div class="sb-body">

    <div class="sb-section">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        <input id="searchInput" type="text" placeholder="Search places…" autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="Clear">✕</button>
      </div>
    </div>

    <div class="sb-section">
      <h3>Days <span class="hint" id="daysHint">tap to filter</span></h3>
      <div class="day-pills" id="dayPills"></div>
    </div>

    <div class="sb-section">
      <h3>Categories</h3>
      <div class="cat-list" id="catList"></div>
    </div>

    <div class="sb-section">
      <h3>Map options</h3>
      <div class="toggle-row" id="routeToggle">
        <div>
          <div class="label">Show route</div>
          <div class="sublabel">Day 1 → Day 16, blue to red</div>
        </div>
        <div class="switch"></div>
      </div>
      <div class="toggle-row" id="labelsToggle">
        <div>
          <div class="label">Place labels</div>
          <div class="sublabel">Show name under each pin</div>
        </div>
        <div class="switch"></div>
      </div>
    </div>

    <div class="sb-section">
      <div class="action-grid">
        <button class="action-btn" id="todayBtn">📅 Jump to day</button>
        <button class="action-btn" id="shareBtn">🔗 Share view</button>
      </div>
    </div>

  </div>

  <div class="sb-footer">
    <div class="legend-grid" id="legendGrid"></div>
  </div>
</aside>

<div id="backdrop"></div>

<button id="fitBtn" title="Fit map to visible pins">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V3h6"></path><path d="M21 9V3h-6"></path><path d="M3 15v6h6"></path><path d="M21 15v6h-6"></path></svg>
  Reset view
</button>

<div id="toast"></div>

<div id="map"></div>

<script src="vendor/leaflet/leaflet.js"></script>
<script type="module" src="js/app.js"></script>
<script src="js/install.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.warn("Service worker registration failed:", err);
      });
    });
  }
</script>
</body>
</html>
